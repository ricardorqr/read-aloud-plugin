name: Release

on:
  push:
    branches: [master]

permissions:
  contents: write        # push the chore(release) commit + tag, create the Release
  issues: write          # semantic-release can comment on resolved issues
  pull-requests: write   # …and on merged PRs

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history so version is computed from all tags
          persist-credentials: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Semantic Release
        uses: cycjimmy/semantic-release-action@v4
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/exec
            @semantic-release/git
            conventional-changelog-conventionalcommits
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Author the chore(release) commit as the repo owner, not
          # semantic-release-bot, so no bot appears in the contributors list.
          GIT_AUTHOR_NAME: Ricardo Ribeiro
          GIT_AUTHOR_EMAIL: ricardorqr@gmail.com
          GIT_COMMITTER_NAME: Ricardo Ribeiro
          GIT_COMMITTER_EMAIL: ricardorqr@gmail.com
